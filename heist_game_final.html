<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>HEIST — AI Guard vs Thief</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0b0c0f;
      --surface: #13151a;
      --border: #1e2028;
      --red: #e03030;
      --red-dim: #6b1515;
      --amber: #d4890a;
      --green: #2cb67d;
      --gold: #c9a227;
      --text: #c8cdd8;
      --muted: #454a58;
      --mono: 'IBM Plex Mono', monospace;
      --display: 'Bebas Neue', sans-serif;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: var(--text);
      font-family: var(--mono);
      cursor: default;
    }

    /* Subtle dot-grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #1e2028 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.5;
      pointer-events: none;
    }

    /* ── WRAPPER ─────────────────────────────────── */
    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      position: relative;
      z-index: 1;
    }

    /* ── TITLE BAR ───────────────────────────────── */
    .title-bar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px;
      margin-bottom: 10px;
    }

    .game-title {
      font-family: var(--display);
      font-size: 2.2rem;
      letter-spacing: 8px;
      color: #fff;
      line-height: 1;
    }

    .game-title span {
      color: var(--red);
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.6rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .rec-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--red);
      animation: blink 1.1s ease-in-out infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.15;
      }
    }

    /* ── HUD ROW (above canvas) ──────────────────── */
    .hud {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 6px 6px 0 0;
    }

    .hud-group {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .hud-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .hud-label {
      font-size: 0.48rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .hud-value {
      font-size: 1.05rem;
      font-weight: 500;
      color: #fff;
      letter-spacing: 2px;
      line-height: 1;
    }

    /* Mode pill */
    .mode-pill {
      padding: 3px 12px;
      border-radius: 2px;
      font-size: 0.65rem;
      letter-spacing: 3px;
      font-weight: 500;
      text-transform: uppercase;
      border: 1px solid var(--green);
      color: var(--green);
      background: rgba(44, 182, 125, 0.08);
      transition: all 0.25s;
      min-width: 100px;
      text-align: center;
    }

    .mode-pill.chase {
      border-color: var(--red);
      color: var(--red);
      background: rgba(224, 48, 48, 0.1);
      animation: pulse-border 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse-border {
      from {
        box-shadow: none;
      }

      to {
        box-shadow: 0 0 8px rgba(224, 48, 48, 0.4);
      }
    }

    /* Threat dots */
    .threat-dots {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .tdot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.2s;
    }

    .tdot.on-low {
      background: var(--green);
    }

    .tdot.on-mid {
      background: var(--amber);
    }

    .tdot.on-high {
      background: var(--red);
      box-shadow: 0 0 6px var(--red);
    }

    /* ── CANVAS SHELL ────────────────────────────── */
    .canvas-shell {
      position: relative;
      border: 1px solid var(--border);
      border-top: none;
      border-bottom: none;
      line-height: 0;
    }

    /* Scanline overlay */
    .canvas-shell::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px,
          rgba(0, 0, 0, 0.08) 2px, rgba(0, 0, 0, 0.08) 3px);
      pointer-events: none;
      z-index: 2;
    }

    canvas {
      display: block;
      outline: none;
      cursor: none;
    }

    /* Corner labels */
    .corner {
      position: absolute;
      font-size: 0.5rem;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.18);
      z-index: 3;
      pointer-events: none;
      text-transform: uppercase;
    }

    .corner.tl {
      top: 8px;
      left: 10px;
    }

    .corner.tr {
      top: 8px;
      right: 10px;
      text-align: right;
    }

    .corner.bl {
      bottom: 8px;
      left: 10px;
    }

    .corner.br {
      bottom: 8px;
      right: 10px;
      text-align: right;
    }

    /* ── BOTTOM BAR ──────────────────────────────── */
    .bottom-bar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--red);
      border-radius: 0 0 6px 6px;
    }

    .status-text {
      font-family: var(--display);
      font-size: 1rem;
      letter-spacing: 4px;
      color: var(--text);
      transition: color 0.3s;
    }

    .status-text.win {
      color: var(--green);
    }

    .status-text.lose {
      color: var(--red);
    }

    .btn-group {
      display: flex;
      gap: 8px;
    }

    .btn {
      font-family: var(--display);
      font-size: 0.85rem;
      letter-spacing: 3px;
      padding: 5px 16px;
      background: transparent;
      border: 1px solid var(--muted);
      color: var(--text);
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.15s;
    }

    .btn:hover {
      border-color: #fff;
      color: #fff;
      background: rgba(255, 255, 255, 0.05);
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn.danger {
      border-color: var(--red-dim);
      color: var(--red);
    }

    .btn.danger:hover {
      border-color: var(--red);
      background: rgba(224, 48, 48, 0.08);
    }

    /* ── LEGEND ROW ──────────────────────────────── */
    .legend {
      display: flex;
      gap: 18px;
      margin-top: 10px;
      align-items: center;
    }

    .leg {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.55rem;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .leg-ico {
      width: 10px;
      height: 10px;
      border-radius: 1px;
      flex-shrink: 0;
    }
  </style>
</head>

<body>

  <div class="wrap" id="wrap">

    <!-- TITLE -->
    <div class="title-bar">
      <div class="game-title">HEIST <span>/</span> AI GUARD</div>
      <div class="live-badge"><span class="rec-dot"></span> REC &nbsp;·&nbsp; CAM-07 &nbsp;·&nbsp; <span
          id="clock">00:00</span></div>
    </div>

    <!-- HUD -->
    <div class="hud" id="hud">
      <div class="hud-group">
        <div class="hud-stat">
          <span class="hud-label">Steps</span>
          <span class="hud-value" id="steps">000</span>
        </div>
        <div class="hud-stat">
          <span class="hud-label">Dist</span>
          <span class="hud-value" id="dist">--</span>
        </div>
      </div>

      <div class="mode-pill" id="mode-pill">PATROLLING</div>

      <div class="hud-group">
        <div class="hud-stat">
          <span class="hud-label">Threat</span>
          <div class="threat-dots" id="threat-dots">
            <div class="tdot"></div>
            <div class="tdot"></div>
            <div class="tdot"></div>
            <div class="tdot"></div>
            <div class="tdot"></div>
            <div class="tdot"></div>
          </div>
        </div>
        <div class="hud-stat">
          <span class="hud-label">Keys</span>
          <span class="hud-value" style="font-size:0.6rem;letter-spacing:1px;color:var(--muted)">WASD / ↑↓←→</span>
        </div>
      </div>
    </div>

    <!-- CANVAS -->
    <div class="canvas-shell" id="shell">
      <div class="corner tl">SECTOR-B</div>
      <div class="corner tr">NIGHT OPS</div>
      <div class="corner bl" id="cctv-ts">2047-03-14</div>
      <div class="corner br">ENCRYPTED</div>
      <canvas id="canvas" tabindex="0"></canvas>
    </div>

    <!-- BOTTOM -->
    <div class="bottom-bar">
      <div class="status-text" id="status">PRESS START TO BEGIN</div>
      <div class="btn-group">
        <button class="btn" id="btn-start">▶ START</button>
        <button class="btn" id="btn-reset">↺ RESET</button>
        <button class="btn danger" id="btn-new">⊞ NEW MAP</button>
      </div>
    </div>

    <!-- LEGEND -->
    <div class="legend">
      <div class="leg">
        <div class="leg-ico" style="background:#3d7a58;border-radius:50%"></div>You
      </div>
      <div class="leg">
        <div class="leg-ico" style="background:#e03030;clip-path:polygon(50% 0%,100% 100%,0% 100%)"></div>Guard
      </div>
      <div class="leg">
        <div class="leg-ico" style="background:#c9a227"></div>Objective
      </div>
      <div class="leg">
        <div class="leg-ico" style="background:#2a2e38"></div>Wall
      </div>
      <div class="leg">
        <div class="leg-ico" style="background:rgba(224,48,48,0.25);border:1px dashed #e03030"></div>Detect Zone
      </div>
      <div class="leg">
        <div class="leg-ico" style="background:rgba(224,48,48,0.6);border-radius:50%"></div>BFS Path
      </div>
    </div>

  </div>

  <script>
    (function () {
      'use strict';

      // ── CONFIG ────────────────────────────────────────
      const COLS = 16;
      const ROWS = 16;
      const CHASE_RANGE = 5;
      const CHASE_MS = 260;
      const PATROL_MS = 500;
      const DIRS = [[-1, 0], [1, 0], [0, -1], [0, 1]];

      // ── CANVAS SIZING ─────────────────────────────────
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      function fitCanvas() {
        const padding = 40;
        const topUI = 180; // title + hud + bottom + legend approx
        const maxW = window.innerWidth - padding;
        const maxH = window.innerHeight - topUI;
        const sz = Math.floor(Math.min(maxW, maxH) / COLS) * COLS;
        canvas.width = sz;
        canvas.height = sz;
        document.getElementById('hud').style.width = sz + 'px';
        document.getElementById('shell').style.width = sz + 'px';
        document.querySelector('.bottom-bar').style.width = sz + 'px';
        document.querySelector('.title-bar').style.width = sz + 'px';
        document.querySelector('.legend').style.width = sz + 'px';
      }
      fitCanvas();
      window.addEventListener('resize', () => { fitCanvas(); render(); });

      const C = () => canvas.width / COLS;

      // ── STATE ─────────────────────────────────────────
      let grid, player, guard, goal;
      let guardMode = 'patrol';
      let patrolTarget = null;
      let chasePath = [];
      let guardTimer = null;
      let steps = 0, gameOver = false, won = false;
      let gameStarted = false;

      // ── HELPERS ───────────────────────────────────────
      const idx = (r, c) => r * COLS + c;
      const inB = (r, c) => r >= 0 && r < ROWS && c >= 0 && c < COLS;
      const isWall = (r, c) => grid[idx(r, c)] === 1;
      const pos = (r, c) => ({ r, c });
      const eq = (a, b) => a.r === b.r && a.c === b.c;
      const mdist = (a, b) => Math.abs(a.r - b.r) + Math.abs(a.c - b.c);

      // ── SOUNDS ────────────────────────────────────────
      function playBeep(frequency, duration, volume = 0.1) {
        try {
          const audioContext = new (window.AudioContext || window.webkitAudioContext)();
          const oscillator = audioContext.createOscillator();
          const gainNode = audioContext.createGain();
          oscillator.connect(gainNode);
          gainNode.connect(audioContext.destination);
          oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
          gainNode.gain.setValueAtTime(volume, audioContext.currentTime);
          oscillator.start(audioContext.currentTime);
          oscillator.stop(audioContext.currentTime + duration);
        } catch (e) { /* ignore if audio not supported */ }
      }

      function playChaseSound() {
        try {
          const audio = new Audio('chase_sound.mp3'); // Replace with your sound file path
          audio.volume = 0.3;
          audio.play();
        } catch (e) { playBeep(800, 0.2, 0.15); } // Fallback to beep
      }
      function playCaughtSound() { playBeep(200, 0.5, 0.2); }

      // ── MAP ───────────────────────────────────────────
      function generateMap() {
        grid = new Array(ROWS * COLS).fill(0);
        for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++)
          if (r === 0 || r === ROWS - 1 || c === 0 || c === COLS - 1) grid[idx(r, c)] = 1;
        for (let r = 1; r < ROWS - 1; r++) for (let c = 1; c < COLS - 1; c++)
          if (Math.random() < 0.22) grid[idx(r, c)] = 1;
        // L-shaped blocks
        for (let i = 0; i < 5; i++) {
          let r = 2 + Math.floor(Math.random() * (ROWS - 5));
          let c = 2 + Math.floor(Math.random() * (COLS - 5));
          for (let k = 0; k < 3; k++) if (inB(r, c + k)) grid[idx(r, c + k)] = 1;
          for (let k = 0; k < 2; k++) if (inB(r + k, c)) grid[idx(r + k, c)] = 1;
        }
        [[1, 1], [1, 2], [2, 1], [2, 2]].forEach(([r, c]) => grid[idx(r, c)] = 0);
        [[ROWS - 2, COLS - 2], [ROWS - 3, COLS - 2], [ROWS - 2, COLS - 3]].forEach(([r, c]) => grid[idx(r, c)] = 0);
        [[ROWS - 2, 1], [ROWS - 3, 1], [ROWS - 2, 2]].forEach(([r, c]) => grid[idx(r, c)] = 0);
        ensureConnected();
      }

      function ensureConnected() {
        let vis = new Set(), q = [pos(1, 1)];
        vis.add(idx(1, 1));
        while (q.length) {
          let { r, c } = q.shift();
          if (r === ROWS - 2 && c === COLS - 2) return;
          for (let [dr, dc] of DIRS) {
            let nr = r + dr, nc = c + dc, ni = idx(nr, nc);
            if (inB(nr, nc) && !isWall(nr, nc) && !vis.has(ni)) { vis.add(ni); q.push(pos(nr, nc)); }
          }
        }
        let r = 1, c = 1;
        while (r < ROWS - 2 || c < COLS - 2) {
          if (r < ROWS - 2) grid[idx(++r, c)] = 0;
          if (c < COLS - 2) grid[idx(r, ++c)] = 0;
        }
      }

      // ── BFS ───────────────────────────────────────────
      function bfs(start, end) {
        if (isWall(end.r, end.c)) return [];
        let par = new Map(), q = [start];
        par.set(idx(start.r, start.c), null);
        while (q.length) {
          let cur = q.shift();
          if (eq(cur, end)) {
            let path = [], node = end;
            while (!eq(node, start)) {
              path.unshift(node);
              let p = par.get(idx(node.r, node.c));
              node = pos(Math.floor(p / COLS), p % COLS);
            }
            return path;
          }
          for (let [dr, dc] of DIRS) {
            let nr = cur.r + dr, nc = cur.c + dc, ni = idx(nr, nc);
            if (inB(nr, nc) && !isWall(nr, nc) && !par.has(ni)) {
              par.set(ni, idx(cur.r, cur.c)); q.push(pos(nr, nc));
            }
          }
        }
        return [];
      }

      // ── AI GUARD ──────────────────────────────────────
      /*
       * Rule-based reactive agent:
       * RULE 1 (priority): dist ≤ CHASE_RANGE → Chase via BFS
       * RULE 2 (fallback): else → Patrol random waypoints via BFS
       */
      function guardStep() {
        if (gameOver) return;
        let d = mdist(guard, player);
        updateHUD(d);

        let prevMode = guardMode;

        if (d <= CHASE_RANGE) {
          guardMode = 'chase';
          chasePath = bfs(guard, player);
          if (chasePath.length > 0) guard = chasePath[0];
        } else {
          guardMode = 'patrol';
          chasePath = [];
          if (!patrolTarget || eq(guard, patrolTarget)) patrolTarget = rndFree();
          let path = bfs(guard, patrolTarget);
          if (path.length > 0) guard = path[0];
          else patrolTarget = rndFree();
        }

        if (guardMode === 'chase' && prevMode !== 'chase') playChaseSound();

        checkCollision();
        render();
        scheduleGuard();
      }

      function scheduleGuard() {
        if (gameOver) return;
        clearTimeout(guardTimer);
        guardTimer = setTimeout(guardStep, guardMode === 'chase' ? CHASE_MS : PATROL_MS);
      }

      function rndFree() {
        let r, c;
        do { r = 1 + Math.floor(Math.random() * (ROWS - 2)); c = 1 + Math.floor(Math.random() * (COLS - 2)); }
        while (isWall(r, c));
        return pos(r, c);
      }

      // ── COLLISION ─────────────────────────────────────
      function checkCollision() {
        if (eq(guard, player)) { playCaughtSound(); endGame(false); }
        if (eq(player, goal)) endGame(true);
      }

      function endGame(win) {
        gameOver = true; won = win;
        clearTimeout(guardTimer);
        let s = document.getElementById('status');
        if (win) { s.className = 'status-text win'; s.textContent = 'OBJECTIVE SECURED — MISSION COMPLETE'; }
        else { s.className = 'status-text lose'; s.textContent = 'OPERATIVE CAUGHT — MISSION FAILED'; }
        render();
      }

      // ── PLAYER ────────────────────────────────────────
      function movePlayer(dr, dc) {
        if (gameOver || !gameStarted) return;
        let nr = player.r + dr, nc = player.c + dc;
        if (!inB(nr, nc) || isWall(nr, nc)) return;
        player = pos(nr, nc); steps++;
        checkCollision(); render();
      }

      // ── HUD ───────────────────────────────────────────
      function updateHUD(d) {
        document.getElementById('steps').textContent = String(steps).padStart(3, '0');
        document.getElementById('dist').textContent = d === undefined ? '--' : String(d).padStart(2, '0');

        let pill = document.getElementById('mode-pill');
        if (guardMode === 'chase') { pill.textContent = 'CHASING'; pill.className = 'mode-pill chase'; }
        else { pill.textContent = 'PATROLLING'; pill.className = 'mode-pill'; }

        // Threat dots (6 dots)
        let dots = document.querySelectorAll('.tdot');
        let maxD = COLS + ROWS;
        let prox = d === undefined ? 0 : Math.max(0, (maxD - d) / maxD);
        let active = Math.round(prox * 6);
        dots.forEach((dot, i) => {
          dot.className = 'tdot';
          if (i < active) {
            if (i < 2) dot.classList.add('on-low');
            else if (i < 4) dot.classList.add('on-mid');
            else dot.classList.add('on-high');
          }
        });
      }

      // Clock
      function updateClock() {
        let n = new Date();
        let h = n.getHours().toString().padStart(2, '0');
        let m = n.getMinutes().toString().padStart(2, '0');
        document.getElementById('clock').textContent = h + ':' + m;
        document.getElementById('cctv-ts').textContent =
          n.getFullYear() + '-' + (n.getMonth() + 1).toString().padStart(2, '0') + '-' + n.getDate().toString().padStart(2, '0');
      }
      setInterval(updateClock, 1000); updateClock();

      // ── RENDER ────────────────────────────────────────
      function render() {
        const SZ = canvas.width;
        const cell = C();
        ctx.clearRect(0, 0, SZ, SZ);

        // Background
        ctx.fillStyle = '#0d0f14';
        ctx.fillRect(0, 0, SZ, SZ);

        // ── Grid tiles ─────────────────────────────────
        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) {
            let x = c * cell, y = r * cell;
            if (isWall(r, c)) {
              // Layered concrete wall
              ctx.fillStyle = '#1a1d24'; ctx.fillRect(x, y, cell, cell);
              ctx.fillStyle = '#1f2330'; ctx.fillRect(x + 1, y + 1, cell - 2, cell - 2);
              ctx.fillStyle = '#242840'; ctx.fillRect(x + 2, y + 2, cell - 4, cell - 4);
              // Top-left highlight edge
              ctx.fillStyle = 'rgba(255,255,255,0.04)';
              ctx.fillRect(x + 2, y + 2, cell - 4, 1);
              ctx.fillRect(x + 2, y + 2, 1, cell - 4);
            } else {
              // Floor tile
              ctx.fillStyle = '#0d0f14'; ctx.fillRect(x, y, cell, cell);
              ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 0.5;
              ctx.strokeRect(x + 0.25, y + 0.25, cell - 0.5, cell - 0.5);
            }
          }
        }

        // ── Detection zone ──────────────────────────────
        if (!gameOver) {
          for (let r = guard.r - CHASE_RANGE; r <= guard.r + CHASE_RANGE; r++) {
            for (let c = guard.c - CHASE_RANGE; c <= guard.c + CHASE_RANGE; c++) {
              if (!inB(r, c) || isWall(r, c)) continue;
              let d = mdist(pos(r, c), guard);
              if (d <= CHASE_RANGE) {
                let alpha = d === CHASE_RANGE ? 0.22 : 0.10;
                ctx.fillStyle = `rgba(224,48,48,${alpha})`;
                ctx.fillRect(c * cell + 1, r * cell + 1, cell - 2, cell - 2);
              }
            }
          }
        }

        // ── BFS path breadcrumbs ────────────────────────
        if (guardMode === 'chase' && chasePath.length > 0 && !gameOver) {
          chasePath.slice(0, -1).forEach((p, i) => {
            let alpha = 0.75 - (i / chasePath.length) * 0.55;
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = '#e03030';
            ctx.beginPath();
            ctx.arc(p.c * cell + cell / 2, p.r * cell + cell / 2, Math.max(2, cell * 0.11), 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          });
        }

        // ── Goal ────────────────────────────────────────
        drawGoal(goal.c * cell + cell / 2, goal.r * cell + cell / 2, cell);

        // ── Player ──────────────────────────────────────
        drawPlayer(player.c * cell + cell / 2, player.r * cell + cell / 2, cell);

        // ── Guard ───────────────────────────────────────
        drawGuard(guard.c * cell + cell / 2, guard.r * cell + cell / 2, cell);

        // ── Game over overlay ───────────────────────────
        if (gameOver) {
          ctx.save();
          ctx.globalAlpha = 0.72;
          ctx.fillStyle = '#0b0c0f';
          ctx.fillRect(0, 0, SZ, SZ);
          ctx.restore();

          ctx.save();
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.font = `bold ${Math.floor(cell * 1.3)}px 'Bebas Neue',sans-serif`;
          ctx.fillStyle = won ? '#2cb67d' : '#e03030';
          ctx.fillText(won ? 'MISSION COMPLETE' : 'CAUGHT!', SZ / 2, SZ / 2 - cell * 0.4);
          ctx.font = `${Math.floor(cell * 0.42)}px 'IBM Plex Mono',monospace`;
          ctx.fillStyle = 'rgba(200,205,216,0.4)';
          ctx.fillText('PRESS RESET OR NEW MAP', SZ / 2, SZ / 2 + cell * 0.35);
          ctx.restore();
        }
      }

      // ── Draw helpers ─────────────────────────────────

      function drawGoal(cx, cy, cell) {
        let r = cell * 0.28;
        let t = Date.now() / 700;
        let pulse = Math.sin(t) * 0.12 + 0.88;

        // Outer glow
        ctx.save();
        ctx.globalAlpha = 0.22 * pulse;
        ctx.fillStyle = '#c9a227';
        ctx.beginPath(); ctx.arc(cx, cy, r * 1.7, 0, Math.PI * 2); ctx.fill();
        ctx.restore();

        // Diamond body
        ctx.save();
        ctx.translate(cx, cy); ctx.rotate(Math.PI / 4);
        let grad = ctx.createLinearGradient(-r, -r, r, r);
        grad.addColorStop(0, '#f0c030');
        grad.addColorStop(0.5, '#c9a227');
        grad.addColorStop(1, '#7a5c08');
        ctx.fillStyle = grad;
        let s = r * 0.75;
        ctx.fillRect(-s, -s, s * 2, s * 2);
        // Shine
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillRect(-s + 2, -s + 2, s * 0.4, s * 0.4);
        ctx.restore();

        // Dashed crosshair
        ctx.save();
        ctx.globalAlpha = 0.4;
        ctx.strokeStyle = '#c9a227'; ctx.lineWidth = 0.5;
        ctx.setLineDash([2, 3]);
        ctx.beginPath(); ctx.moveTo(cx - r * 1.6, cy); ctx.lineTo(cx + r * 1.6, cy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx, cy - r * 1.6); ctx.lineTo(cx, cy + r * 1.6); ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }

      function drawPlayer(cx, cy, cell) {
        let r = cell * 0.3;

        // Drop shadow
        ctx.save(); ctx.globalAlpha = 0.25;
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.ellipse(cx + 2, cy + r * 0.7, r * 0.7, r * 0.22, 0, 0, Math.PI * 2); ctx.fill();
        ctx.restore();

        // Body
        let g = ctx.createRadialGradient(cx - r * 0.25, cy - r * 0.25, r * 0.05, cx, cy, r);
        g.addColorStop(0, '#56c98a'); g.addColorStop(1, '#1f5a3a');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();

        // Outfit band
        ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = r * 0.25;
        ctx.beginPath(); ctx.arc(cx, cy, r * 0.6, Math.PI * 0.25, Math.PI * 0.75); ctx.stroke();

        // Eyes
        ctx.fillStyle = '#d0f4e0';
        ctx.beginPath(); ctx.arc(cx - r * 0.28, cy - r * 0.14, r * 0.17, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx + r * 0.28, cy - r * 0.14, r * 0.17, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#0a2016';
        ctx.beginPath(); ctx.arc(cx - r * 0.25, cy - r * 0.10, r * 0.08, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx + r * 0.31, cy - r * 0.10, r * 0.08, 0, Math.PI * 2); ctx.fill();

        // Outline
        ctx.strokeStyle = '#1a3d28'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
      }

      function drawGuard(cx, cy, cell) {
        let r = cell * 0.33;
        let chasing = guardMode === 'chase';

        // Shadow
        ctx.save(); ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.ellipse(cx + 2, cy + r * 0.6, r * 0.8, r * 0.22, 0, 0, Math.PI * 2); ctx.fill();
        ctx.restore();

        // Chase pulse ring
        if (chasing && !gameOver) {
          let pulse = 0.35 + 0.3 * Math.sin(Date.now() / 130);
          ctx.save(); ctx.globalAlpha = pulse;
          ctx.strokeStyle = '#e03030'; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.arc(cx, cy, r + 6, 0, Math.PI * 2); ctx.stroke();
          ctx.restore();
        }

        // Triangle
        let g2 = ctx.createLinearGradient(cx, cy - r, cx, cy + r);
        g2.addColorStop(0, chasing ? '#ff4444' : '#c02020');
        g2.addColorStop(1, '#400808');
        ctx.fillStyle = g2;
        ctx.beginPath();
        ctx.moveTo(cx, cy - r);
        ctx.lineTo(cx + r * 0.9, cy + r * 0.58);
        ctx.lineTo(cx - r * 0.9, cy + r * 0.58);
        ctx.closePath();
        ctx.fill();

        // Badge dot
        ctx.fillStyle = 'rgba(255,210,60,0.6)';
        ctx.beginPath(); ctx.arc(cx, cy + r * 0.1, r * 0.14, 0, Math.PI * 2); ctx.fill();

        // Eyes
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(cx - r * 0.23, cy - r * 0.05, r * 0.15, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx + r * 0.23, cy - r * 0.05, r * 0.15, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#1a0000';
        ctx.beginPath(); ctx.arc(cx - r * 0.20, cy - r * 0.02, r * 0.07, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx + r * 0.26, cy - r * 0.02, r * 0.07, 0, Math.PI * 2); ctx.fill();

        // Angry brows when chasing
        if (chasing) {
          ctx.strokeStyle = 'rgba(0,0,0,0.7)'; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(cx - r * 0.35, cy - r * 0.22); ctx.lineTo(cx - r * 0.10, cy - r * 0.14); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(cx + r * 0.35, cy - r * 0.22); ctx.lineTo(cx + r * 0.10, cy - r * 0.14); ctx.stroke();
        }

        // Outline
        ctx.strokeStyle = '#2a0404'; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(cx, cy - r); ctx.lineTo(cx + r * 0.9, cy + r * 0.58); ctx.lineTo(cx - r * 0.9, cy + r * 0.58);
        ctx.closePath(); ctx.stroke();
      }

      // ── INIT ─────────────────────────────────────────
      function init(newMap = true, startGuard = true) {
        clearTimeout(guardTimer);
        if (newMap) generateMap();

        player = pos(1, 1);
        guard = pos(ROWS - 2, 1);
        goal = pos(ROWS - 2, COLS - 2);

        guardMode = 'patrol'; patrolTarget = null; chasePath = [];
        steps = 0; gameOver = false; won = false;
        gameStarted = startGuard;

        let s = document.getElementById('status');
        s.className = 'status-text';
        if (!startGuard) {
          s.textContent = 'PRESS START TO BEGIN';
        } else {
          s.textContent = 'MOVE TO BEGIN — REACH THE OBJECTIVE';
        }

        updateHUD(undefined);
        render();
        canvas.focus();
        if (startGuard) scheduleGuard();
      }

      // ── EVENTS ───────────────────────────────────────
      document.addEventListener('keydown', e => {
        const map = {
          ArrowUp: [-1, 0], ArrowDown: [1, 0], ArrowLeft: [0, -1], ArrowRight: [0, 1],
          w: [-1, 0], s: [1, 0], a: [0, -1], d: [0, 1],
          W: [-1, 0], S: [1, 0], A: [0, -1], D: [0, 1],
        };
        if (map[e.key]) { e.preventDefault(); movePlayer(...map[e.key]); }
      });

      document.getElementById('btn-start').onclick = () => init(false, true);
      document.getElementById('btn-reset').onclick = () => init(false, false);
      document.getElementById('btn-new').onclick = () => init(true, false);
      canvas.addEventListener('click', () => canvas.focus());

      // Animate goal pulsing
      setInterval(() => { if (!gameOver) render(); }, 80);

      init(true, false);
    })();
  </script>
</body>

</html>
